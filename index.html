<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AppVault — Discover and download Android apps">
  <title>AppVault — Android App Store</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="generalImages/favicon.ico">
  <link rel="icon" type="image/png"    href="generalImages/logo.png">

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/index.css">
</head>
<body>

  <!-- ══════════════════════════════════════
       NAVBAR
  ══════════════════════════════════════ -->
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <img src="generalImages/logo.png"
           alt="AppVault Logo"
           onerror="this.style.display='none'">
    </a>

    <div class="search-bar">
      <img class="search-icon"
           src="generalImages/search-icon.png"
           alt="Search">
      <input type="text"
             id="search-input"
             placeholder="Search apps, games, utilities…"
             autocomplete="off">
    </div>

    <div class="navbar-right">
      <button class="nav-icon-btn" title="Filter" id="nav-filter-btn">
        <img src="generalImages/filter.png" alt="Filter">
      </button>
    </div>
  </nav>

  <!-- ══════════════════════════════════════
       HERO BANNER
  ══════════════════════════════════════ -->
  <section class="hero">
    <img class="hero-img"
         src="generalImages/hero-banner.png"
         alt="AppVault Hero"
         onerror="this.style.display='none'">
    <div class="hero-overlay"></div>
    <div class="hero-overlay-bottom"></div>
    <div class="hero-content">
      <h1>Discover <span>Great</span><br>Android Apps</h1>
      <p>Hand-picked applications, ready to download directly to your device.</p>
    </div>
  </section>

  <!-- ══════════════════════════════════════
       STATS BAR
  ══════════════════════════════════════ -->
  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-value" id="stat-total-apps">0</span>
      <span class="stat-label">Total Apps</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-value" id="stat-categories">0</span>
      <span class="stat-label">Categories</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-value">Free</span>
      <span class="stat-label">All Downloads</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-value">APK</span>
      <span class="stat-label">Direct Install</span>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       FILTER BAR
  ══════════════════════════════════════ -->
  <div class="filter-bar" id="filter-bar">
    <!-- Populated by index.js -->
  </div>

  <!-- ══════════════════════════════════════
       APPS GRID
  ══════════════════════════════════════ -->
  <section class="apps-section">
    <h2 class="section-title">All <span>Apps</span></h2>
    <div class="apps-grid" id="apps-grid">
      <!-- Populated by index.js -->
    </div>
  </section>

  <!-- ══════════════════════════════════════
       FOOTER
  ══════════════════════════════════════ -->
  <footer class="footer">
    <p>Built with ❤️ · <span>AppVault</span> · All APKs are safe and verified</p>
  </footer>

  <!-- Scripts -->
  <script src="app-data.js"></script>
  <script src="assets/js/index.js"></script>
</body>
</html>
